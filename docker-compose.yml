services:
  smartling-mcp:
    build: .
    image: smartling-docker-mcp
    ports:
      - '3000:3000'
    stdin_open: true
    restart: unless-stopped
    volumes:
      - ./sample-files:/workspace/input:ro
      - ./output:/workspace/output
    environment:
      - SMARTLING_USER_IDENTIFIER=${SMARTLING_USER_IDENTIFIER}
      - SMARTLING_USER_SECRET=${SMARTLING_USER_SECRET}
      - SMARTLING_PROJECT_ID=${SMARTLING_PROJECT_ID}
      - SMARTLING_API_BASE_URL=${SMARTLING_API_BASE_URL:-https://api.smartling.com}
      - INPUT_DIR=/workspace/input
      - OUTPUT_DIR=/workspace/output
      - PORT=3000
    env_file:
      - .env
  go-cli:
